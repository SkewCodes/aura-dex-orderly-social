<svg width="100" height="24" viewBox="0 0 100 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Aura Icon - Stylized "A" with glow effect -->
  <defs>
    <linearGradient id="auraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon: Stylized hexagon with inner glow -->
  <g filter="url(#glow)">
    <path d="M12 2L21.5 7.5V16.5L12 22L2.5 16.5V7.5L12 2Z" fill="url(#auraGradient)"/>
    <path d="M12 6L17 9V15L12 18L7 15V9L12 6Z" fill="#0A0E17" fill-opacity="0.6"/>
    <circle cx="12" cy="12" r="2.5" fill="url(#auraGradient)"/>
  </g>
  
  <!-- AURA Text -->
  <text x="28" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="white" letter-spacing="1">AURA</text>
</svg>
